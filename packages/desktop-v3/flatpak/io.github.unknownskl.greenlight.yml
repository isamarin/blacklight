app-id: io.github.unknownskl.greenlight
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: run.sh
separate-locales: false
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=pulseaudio
  - --share=network
  - --allow=bluetooth
  - --device=all
  - --filesystem=/run/udev:ro
build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    NPM_CONFIG_LOGLEVEL: info
modules:
  - name: greenlight
    buildsystem: simple
    build-options:
      append-path: /run/build/greenlight/npm-global/bin:/usr/lib/sdk/node24/bin
      env:
        XDG_CACHE_HOME: /run/build/greenlight/flatpak-node/cache
        npm_config_cache: /run/build/greenlight/flatpak-node/npm-cache
        npm_config_offline: 'true'
    build-commands:
      - npm install -g /run/build/greenlight/pnpm-pkg/pnpm-10.4.1.tgz --prefix /run/build/greenlight/npm-global --offline
      - pnpm install --offline
      - pnpm build:depsv3 --offline
      - pnpm --filter greenlight-desktop-v3 run flatpak-build --offline -- --linux
      # Add icon, metadata and desktop file
      - install -Dm 644 packages/desktop/flatpak/io.github.unknownskl.greenlight.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png
      - install -Dm 644 packages/desktop/flatpak/io.github.unknownskl.greenlight.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm 644 packages/desktop/flatpak/io.github.unknownskl.greenlight.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.appdata.xml
      # Bundle app and dependencies
      - cp -a packages/desktop-v3/dist/linux*unpacked /app/main
      # Install app wrapper
      - install -Dm755 -t /app/bin/ ../run.sh
    subdir: main
    sources:
      # Build from source
      - type: dir
        path: ../../../
        dest: main
      # - type: git
      #   url: https://github.com/unknownskl/greenlight
      #   tag: v2.0.0-beta15
      #   commit: 862b0e2502eeb9539126ba7a8d4aeb630a41b148
      #   dest: main
      - pnpm-sources.json
      - type: file
        url: https://registry.npmjs.org/pnpm/-/pnpm-10.4.1.tgz
        sha256: 4b702887986995933d4300836b04d6d02a43bc72b52e4f7e93a4ca608b959197
        dest: pnpm-pkg
      # Wrapper to launch the app
      - type: script
        dest-filename: run.sh
        commands:
          - echo runtime LD_LIBRARY_PATH = $LD_LIBRARY_PATH
          - echo runtime ARCH = $(uname -m)-$(uname -s | tr '[:upper:]' '[:lower:]')
          - zypak-wrapper.sh /app/main/greenlight-desktop-v3 "$@"
