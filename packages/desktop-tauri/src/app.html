<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" sizes="32x32" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		%sveltekit.head%
	</head>
	<body
		data-sveltekit-preload-data="hover"
		style="margin: 0; background: #0d0d0d; color: #f0f0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
	>
		<div id="boot-fallback" style="padding: 24px">Loading Blacklight…</div>
		<div id="boot-error" style="display: none; padding: 24px; color: #f87171; white-space: pre-wrap"></div>
		<div id="svelte-app" style="min-height: 100vh">%sveltekit.body%</div>
		<script>
			const showBootError = (message) => {
				const el = document.getElementById('boot-error');
				if (!el) return;
				el.style.display = 'block';
				el.textContent = String(message);
			};

			window.addEventListener('error', (event) => {
				showBootError(event.error ?? event.message);
			});

			window.addEventListener('unhandledrejection', (event) => {
				showBootError(event.reason);
			});
		</script>
	</body>
</html>
