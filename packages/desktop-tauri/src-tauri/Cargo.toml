[package]
name = "blacklight-desktop-tauri"
version = "2026.7.13"
description = "Blacklight desktop (Tauri)"
authors = ["Igor Samarin <mako.mmw@gmail.com>"]
license = "PolyForm-Noncommercial-1.0.0"
edition = "2021"

[lib]
name = "blacklight_desktop_tauri_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["devtools"] }
tauri-plugin-opener = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
