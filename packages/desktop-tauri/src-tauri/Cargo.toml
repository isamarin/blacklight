[package]
name = "greenlight-desktop-tauri"
version = "2026.7.1-alpha.1"
description = "Greenlight desktop (Tauri)"
authors = ["Igor Samarin <mako.mmw@gmail.com>"]
edition = "2021"

[lib]
name = "greenlight_desktop_tauri_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
