name: Build Workflow

on:
  push:
    branches:
      - main
      - feature/*
    tags:
      - v*
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/*.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/*.yml'
  workflow_dispatch:
    inputs:
      reset_cache:
        description: 'Reset cache'
        required: false
        default: false
        type: boolean
      
env:
  node_version: 24
  reset_cache: ${{ inputs.reset_cache || false }}

jobs:
  ###
  # Build Desktop V2 (legacy Electron — lint/tests only on push; release builds on v2 tags)
  ###
  lint:
    name: "V2: Lint code"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint code
        run: pnpm desktop lint

  tests:
    name: "V2: Run tests"
    runs-on: ubuntu-latest
    needs: ['lint']
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm desktop test


  release:
    name: "V2: Build/release Electron app"
    runs-on: ${{ matrix.os }}
    needs: ['tests']
    # Legacy V2 Electron; Tauri is the primary desktop target. Only build on v2 release tags.
    if: startsWith(github.ref, 'refs/tags/v2')

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Set up node_modules cache
        if: matrix.os != 'windows-latest'
        uses: actions/cache@v6
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Install rimraf (if reset_cache enabled)
        if: env.reset_cache == 'true'
        run: npm install -g rimraf

      - name: Reset node_modules cache (if reset_cache enabled)
        if: env.reset_cache == 'true'
        run: rimraf node_modules/

      - name: Clean node_modules on Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item -Recurse -Force node_modules
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm desktop build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Electron release
        if: startsWith(github.ref, 'refs/tags/v2')
        working-directory: packages/desktop
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Linux AppImage
        uses: actions/upload-artifact@v7
        with:
          name: blacklight-linux.AppImage
          path: |
            packages/desktop/dist/*.AppImage
        if: matrix.os == 'ubuntu-latest' && contains(github.event.head_commit.message, '[build]')

      - name: Publish Linux DEB
        uses: actions/upload-artifact@v7
        with:
          name: blacklight-linux.deb
          path: |
            packages/desktop/dist/*.deb
        if: matrix.os == 'ubuntu-latest' && contains(github.event.head_commit.message, '[build]')

      - name: Publish Mac DMG
        uses: actions/upload-artifact@v7
        with:
          name: blacklight-macos.dmg
          path: |
            packages/desktop/dist/*.dmg
        if: matrix.os == 'macos-latest' && contains(github.event.head_commit.message, '[build]')

      - name: Publish Windows EXE
        uses: actions/upload-artifact@v7
        with:
          name: blacklight-win.zip
          path: |
            packages/desktop/dist/*.exe
        if: matrix.os == 'windows-latest' && contains(github.event.head_commit.message, '[build]')

  ###
  # Workspace + Tauri desktop
  ###

  lint_workspace:
    name: "Workspace: Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Set up node_modules cache
        uses: actions/cache@v6
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint workspace
        run: pnpm lint

  test_workspace:
    name: "Workspace: Run tests"
    runs-on: ubuntu-latest
    needs: [lint_workspace]
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'
      
      - name: Set up node_modules cache
        uses: actions/cache@v6
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace tests
        run: pnpm test

  smoke_e2e:
    name: "E2E: Auth & stream smoke"
    runs-on: ubuntu-latest
    needs: [test_workspace]
    timeout-minutes: 20

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Set up node_modules cache
        uses: actions/cache@v6
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run auth/stream smoke (API + static UI)
        run: pnpm smoke:e2e

  check_tauri:
    name: "Tauri: Typecheck UI"
    runs-on: ubuntu-latest
    needs: [test_workspace, smoke_e2e]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Set up node_modules cache
        uses: actions/cache@v6
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck SvelteKit UI
        run: pnpm check:tauri

  build_web:
    name: "Tauri: Build static web"
    runs-on: ubuntu-latest
    needs: [check_tauri]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Set up node_modules cache
        uses: actions/cache@v6
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static web for Cloudflare Pages
        run: pnpm build:pages

      - name: Publish web build
        uses: actions/upload-artifact@v7
        with:
          name: blacklight-web
          path: |
            packages/pages/public/*

  tauri_macos:
    name: "Tauri: Build macOS"
    runs-on: macos-latest
    needs: [check_tauri]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop-tauri/src-tauri

      - name: Set up node_modules cache
        uses: actions/cache@v6
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm desktop-tauri tauri:build

      - name: Publish Mac DMG
        uses: actions/upload-artifact@v7
        with:
          name: blacklight-tauri-macos.dmg
          path: |
            packages/desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
        if: github.ref == 'refs/heads/main' || contains(github.event.head_commit.message, '[build]')

      - name: Release Mac DMG
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v20')
        with:
          files: packages/desktop-tauri/src-tauri/target/release/bundle/dmg/*.dmg
          draft: true

  tauri_windows:
    name: "Tauri: Build Windows"
    runs-on: windows-latest
    needs: [tauri_macos]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop-tauri/src-tauri

      - name: Install rimraf (if reset_cache enabled)
        if: env.reset_cache == 'true'
        run: npm install -g rimraf

      - name: Reset node_modules cache (if reset_cache enabled)
        if: env.reset_cache == 'true'
        run: rimraf node_modules/

      - name: Clean node_modules on Windows
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item -Recurse -Force node_modules
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm desktop-tauri tauri:build

      - name: Publish Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: blacklight-tauri-win.exe
          path: |
            packages/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
        if: github.ref == 'refs/heads/main' || contains(github.event.head_commit.message, '[build]')

      - name: Release Windows installer
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/v20')
        with:
          files: packages/desktop-tauri/src-tauri/target/release/bundle/nsis/*.exe
          draft: true

  ###
  # Build Docs
  ###

  build_docs:
    name: "Global: Build Docs"
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.node_version }}
          cache: 'pnpm'

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
  
      - name: Build docs
        run: pnpm --filter @blacklight/docs build

      - name: Upload static files as artifact
        id: deployment-pages
        uses: actions/upload-pages-artifact@v5
        with:
          path: packages/docs/out/

  deploy:
    name: "Global: Deploy Docs"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build_docs
    if: github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment-pages
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Info
        run: echo "Deployed to ${{ steps.deployment-pages.outputs.page_url }}"

  dependabot-merge:
    name: "Dependabot Auto-Merge Check"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' && github.event.pull_request.user.login == 'dependabot[bot]'
    needs: [lint_workspace, build_docs, check_tauri, tauri_macos, tauri_windows]
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Merge when build succeeds
        uses: actions/github-script@v9
        with:
          script: |
            console.log('Build passed, automerging Dependabot PR...');
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'APPROVE',
              body: 'Build passed, automerging Dependabot PR...',
            });
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'merge',
            });
