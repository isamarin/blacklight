name: Build/Docs

on:
  push:
    branches:
      - main-v2
      - feature/*
    tags:
      - v*
    paths:
      - 'packages/docs/**'
      - 'yarn.lock'
      - '.github/workflows/build_docs.yml'
  pull_request:
    branches:
      - main-v2
    paths:
      - 'packages/docs/**'
      - 'yarn.lock'
      - '.github/workflows/build_docs.yml'
  workflow_dispatch:
    inputs:
      reset_cache:
        description: 'Reset cache'
        required: false
        default: false
        type: boolean

env:
  node_version: 22
  reset_cache: ${{ inputs.reset_cache || false }}

permissions:
  id-token: write
  pages: write

# env:
#   DEBUG: '*'

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: ${{ env.node_version }}

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install yarn dependencies
        run: yarn
  
      - name: Build docs
        run: yarn docs build

      - name: Upload static files as artifact
        id: deployment-pages
        uses: actions/upload-pages-artifact@v4 # or specific "vX.X.X" version tag for this action
        with:
          path: packages/docs/out/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main-v2'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment-pages
        uses: actions/deploy-pages@v4

      - name: Info
        run: echo "Deployed to ${{ steps.deployment-pages.outputs.page_url }}"