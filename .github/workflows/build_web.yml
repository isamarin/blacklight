name: Build/Web

on:
  push:
    branches:
      - main-v2
      - feature/*
    tags:
      - v*
    paths:
      - 'packages/web/**'
      - '.github/workflows/build_web.yml'
  pull_request:
    branches:
      - main-v2
    paths:
      - 'packages/web/**'
      - '.github/workflows/build_web.yml'
  workflow_dispatch:
    inputs:
      reset_cache:
        description: 'Reset cache'
        required: false
        default: false
        type: boolean
      
env:
  node_version: 22
  reset_cache: ${{ inputs.reset_cache || false }}

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.node_version }}
      
      - name: Set up node_modules cache
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-yarn-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install yarn dependencies
        run: yarn

      - name: Lint code
        run: yarn web lint

  build:
    name: Build code
    runs-on: ubuntu-latest
    needs: ['lint']
    steps:
      - name: Checkout Git repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Node.js, NPM and Yarn
        uses: actions/setup-node@v4.4.0
        with:
          node-version: ${{ env.node_version }}
      
      - name: Set up node_modules cache
        uses: actions/cache@v4
        continue-on-error: false
        with:
          path: |
            node_modules/
          key: ${{ runner.os }}-${{ runner.arch }}-yarn-${{ hashFiles('**/package.json') }}-${{ hashFiles('**/yarn.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-yarn-

      - name: Reset node_modules cache (if enabled)
        if: env.reset_cache == 'true'
        run: rm -rf node_modules/

      - name: Install yarn dependencies
        run: yarn

      - name: Build dependencies
        run: yarn web build:deps

      - name: Lint code
        run: yarn web build