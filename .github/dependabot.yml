version: 2
updates:

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main-v2"
    labels:
      - "github-actions"
      - "dependencies"

  # Maintain dependencies for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main-v2"
    labels:
      - "yarn"
      - "dependencies"
    versioning-strategy: increase
    groups:
      react:
        patterns:
          - "react$"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      fumadocs:
        patterns:
          - "fumadocs-*"